<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Accenture SSO — Phishing Awareness Demo</title>
<style>
  :root {
    --accent: #7F77DD;
    --accent-soft: #AFA9EC;
    --accent-faint: #CECBF6;
    --card-bg: #1a1320;
    --field-bg: #0e0a12;
    --field-border: #534AB7;
    --radius-lg: 14px;
    --radius-md: 8px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 0%, #241a2e 0%, #0c0810 70%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 2rem 1rem;
  }

  .banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #2a1f10;
    color: #f0c674;
    font-size: 13px;
    text-align: center;
    padding: 8px 16px;
    border-bottom: 1px solid #5c4a20;
    z-index: 10;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 0.5px solid rgba(255,255,255,0.12);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .header {
    background: #000000;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    display: inline-flex;
    width: 40px;
    height: 40px;
    align-items: center;
    justify-content: center;
  }

  .logo-text {
    color: #ffffff;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .logo-text span { color: var(--accent); }

  .header-tag {
    margin-left: auto;
    color: var(--accent-soft);
    font-size: 13px;
  }

  .body {
    padding: 34px 28px 38px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .form-wrap { width: 100%; max-width: 360px; }

  h1 {
    color: #ffffff;
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 6px;
    text-align: center;
  }

  .subtitle {
    color: var(--accent-soft);
    font-size: 13px;
    margin: 0 0 26px;
    text-align: center;
    line-height: 1.6;
  }

  label {
    color: var(--accent-faint);
    font-size: 13px;
    display: block;
    margin: 0 0 6px;
  }

  input {
    width: 100%;
    background: var(--field-bg);
    border: 0.5px solid var(--field-border);
    color: #ffffff;
    padding: 11px 12px;
    border-radius: var(--radius-md);
    font-size: 14px;
    margin-bottom: 16px;
  }
  input:last-of-type { margin-bottom: 22px; }
  input:focus { outline: none; border-color: var(--accent); }

  button {
    width: 100%;
    background: var(--accent);
    border: none;
    color: var(--card-bg);
    font-size: 15px;
    font-weight: 500;
    padding: 11px;
    border-radius: var(--radius-md);
    cursor: pointer;
  }
  button:hover { filter: brightness(1.08); }

  .links {
    color: #7f7a90;
    font-size: 12px;
    margin: 18px 0 0;
    text-align: center;
    line-height: 1.6;
  }

  .msg {
    display: none;
    color: var(--accent-soft);
    font-size: 13px;
    margin: 20px 0 0;
    text-align: center;
    max-width: 360px;
    line-height: 1.6;
  }
</style>
</head>
